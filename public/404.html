<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Encode the path and redirect to index.html with it as a query param
      const path = window.location.pathname + window.location.search;
      window.location.replace("/?p=" + encodeURIComponent(path));
    </script>
  </head>
</html>
